<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zia Nova — Parisienne à Lisbonne 🇫🇷🇵🇹</title>
<meta name="description" content="Zia Nova — mannequin haute couture & streameuse francophone basée à Lisbonne. Mode, golden hour & escapades portugaises.">
<meta name="theme-color" content="#1a0f08">

<meta property="og:title" content="Zia Nova — Parisienne à Lisbonne">
<meta property="og:description" content="Mannequin & créatrice numérique. Mode, golden hour & vibes portugaises.">
<meta property="og:type" content="website">

<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #1a0f08;
  --bg-warm: #2a1810;
  --copper: #d97742;
  --copper-soft: #e89968;
  --cream: #f4e4d4;
  --gold: #f0c97a;
  --shadow: rgba(0, 0, 0, 0.4);
}

html, body {
  background: var(--bg-deep);
  color: var(--cream);
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* Background gradient + subtle texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(217, 119, 66, 0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(240, 201, 122, 0.08) 0%, transparent 50%),
    linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-warm) 100%);
  z-index: -2;
}

/* Subtle film grain */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.5  0 0 0 0 0.4  0 0 0 0 0.3  0 0 0 0.04 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  pointer-events: none;
  z-index: -1;
  opacity: 0.6;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 80px 28px 60px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 36px;
  text-align: center;
}

.kicker {
  font-size: 12px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--copper-soft);
  opacity: 0.8;
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(56px, 12vw, 110px);
  font-weight: 600;
  line-height: 1;
  color: var(--cream);
  letter-spacing: -0.02em;
  text-shadow: 0 4px 30px rgba(217, 119, 66, 0.3);
}

.logo .nova {
  font-style: italic;
  color: var(--gold);
}

.tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(18px, 3.5vw, 26px);
  color: var(--copper-soft);
  font-weight: 400;
  max-width: 540px;
}

.persona {
  font-size: clamp(13px, 2.5vw, 15px);
  color: var(--cream);
  opacity: 0.85;
  letter-spacing: 1px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  align-items: center;
}

.persona .dot {
  color: var(--copper);
  opacity: 0.5;
}

.coming-soon {
  display: inline-block;
  padding: 10px 22px;
  border: 1px solid var(--copper);
  border-radius: 2px;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--copper);
  text-transform: uppercase;
  background: rgba(217, 119, 66, 0.06);
}

/* Social grid */
.social {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  width: 100%;
  max-width: 540px;
  margin-top: 12px;
}

.social a {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px 20px;
  border: 1px solid rgba(244, 228, 212, 0.15);
  border-radius: 4px;
  color: var(--cream);
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 0.5px;
  transition: all 0.25s ease;
  background: rgba(244, 228, 212, 0.02);
  backdrop-filter: blur(4px);
}

.social a:hover {
  border-color: var(--copper);
  background: rgba(217, 119, 66, 0.08);
  color: var(--gold);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
}

.social .icon {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

.social .twitch:hover { border-color: #9146ff; color: #b58aff; }
.social .ig:hover { border-color: #e1306c; color: #ff5e8d; }
.social .threads:hover { border-color: var(--cream); color: var(--cream); }
.social .x:hover { border-color: var(--cream); color: var(--cream); }
.social .fanvue:hover { border-color: var(--copper); color: var(--gold); }
.social .reddit:hover { border-color: #ff4500; color: #ff7a3d; }

/* Footer */
.footer {
  margin-top: auto;
  padding-top: 60px;
  font-size: 11px;
  color: var(--cream);
  opacity: 0.45;
  letter-spacing: 1px;
}

.footer a {
  color: inherit;
  text-decoration: none;
  border-bottom: 1px dotted rgba(244, 228, 212, 0.3);
}

.footer a:hover { color: var(--gold); border-color: var(--gold); }

/* Stagger entrance animation */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.kicker { animation: fadeUp 0.7s 0.1s both; }
.logo { animation: fadeUp 0.8s 0.25s both; }
.tagline { animation: fadeUp 0.7s 0.5s both; }
.persona { animation: fadeUp 0.6s 0.7s both; }
.coming-soon { animation: fadeUp 0.6s 0.85s both; }
.social { animation: fadeUp 0.7s 1.0s both; }

@media (max-width: 480px) {
  .container { padding: 50px 20px 40px; gap: 28px; }
  .social { grid-template-columns: 1fr; max-width: 320px; }
}
</style>
</head>
